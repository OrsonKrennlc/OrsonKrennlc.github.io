<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>控制台 - orsonkrenlc's blog</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2.0">

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>

    <script src="firebase-config.js"></script>

</head>

<body class="page-dashboard">

    <header>
        <div class="container navbar">
            <a href="index.html" class="logo">ShArch</a>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">首页</a></li>
                    <li><a href="categories.html">分类</a></li>
                    <li><a href="dashboard.html">控制台</a></li>
                </ul>
            </nav>
            <div class="hamburger-menu">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="dashboard-container">
            <div class="login-box">
                <div class="login-header">
                    <h1 class="login-title">欢迎回来</h1>
                    <p class="login-subtitle">请输入您的凭据以管理博客</p>
                </div>

                <form class="login-form" id="login-form">
                    <div class="form-group">
                        <label for="login-email">邮箱</label>
                        <input type="email" id="login-email" name="email" placeholder="输入邮箱" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">密码</label>
                        <input type="password" id="login-password" name="password" placeholder="输入密码" required>
                    </div>

                    <p id="login-error" class="login-error-message"></p>

                    <div class="form-actions">
                        <a href="#" class="forgot-password">忘记密码?</a>
                        <button type="submit" class="btn login-btn">登 录</button>
                    </div>
                </form>

            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2025 orsonkrennlc. All rights reserved.</p>
        </div>
    </footer>

    <script>
        // --- 1. 获取表单元素 ---
        const loginForm = document.getElementById('login-form');
        const loginEmail = document.getElementById('login-email');
        const loginPassword = document.getElementById('login-password');
        const loginError = document.getElementById('login-error');

        // --- 2. 监听表单提交 ---
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault(); // 阻止表单默认的刷新行为

            const email = loginEmail.value;
            const password = loginPassword.value;

            // 清除之前的错误
            loginError.textContent = '';

            try {
                // --- 3. [关键] 使用 Firebase Auth 登录 ---
                // auth 实例来自 firebase-config.js (如果它在那里初始化了)
                // 为确保安全，我们在这里获取 auth 实例
                const auth = firebase.auth();

                console.log("正在尝试登录...");
                await auth.signInWithEmailAndPassword(email, password);

                // --- 4. 登录成功 ---
                console.log("登录成功!");
                // [关键] 跳转到真正的管理页面
                window.location.href = 'admin.html';

            } catch (error) {
                // --- 5. 登录失败 ---
                console.error("登录失败:", error.message);
                if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
                    loginError.textContent = '邮箱或密码不正确。';
                } else {
                    loginError.textContent = '登录时发生错误，请稍后再试。';
                }
            }
        });

        // --- 全局汉堡包菜单JS ---
        const hamburgerMenu = document.querySelector('.hamburger-menu');
        const navLinks = document.querySelector('.nav-links');

        hamburgerMenu.addEventListener('click', () => {
            hamburgerMenu.classList.toggle('active');
            navLinks.classList.toggle('active');
        });
    </script>
</body>

</html>

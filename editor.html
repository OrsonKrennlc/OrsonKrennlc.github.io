<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章编辑器 - orsonkrenlc's blog</title>
    <link rel="stylesheet" href="style.css?v=1.2">

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
</head>
<body class="page-dashboard"> <header>
        <div class="container navbar">
            <a href="admin.html" class="logo">文章编辑器</a>
            <nav>
                <ul class="nav-links">
                    <li><a href="admin.html">返回列表</a></li>
                    <li><a href="#" id="logout-button">退出登录</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <div class="editor-container"> <h1 id="editor-title">新建文章</h1>

            <form id="editor-form" class="editor-form">

                <div class="form-group">
                    <label for="post-title">文章标题</label>
                    <input type="text" id="post-title" required>
                </div>

                <div class="form-group-row">
                    <div class="form-group">
                        <label for="post-date">日期 (例如: 2024-04-23)</label>
                        <input type="text" id="post-date" required>
                    </div>
                    <div class="form-group">
                        <label for="post-category">分类 (例如: 技术分享)</label>
                        <input type="text" id="post-category" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="post-image-url">特色图片 URL (可选)</label>
                    <input type="text" id="post-image-url">
                </div>

                <div class="form-group">
                    <label for="post-summary">摘要 (可选)</label>
                    <textarea id="post-summary" rows="3"></textarea>
                </div>

                <div class="form-group">
                    <label for="post-content">正文 (Markdown)</label>
                    <textarea id="post-content" rows="20" required></textarea>
                </div>

                <p id="editor-message"></p>

                <div class="form-actions">
                    <button type="submit" class="btn" id="save-button">保存文章</button>
                </div>

            </form>
        </div>
    </main>

    <script>
        // --- 0. 检查登录状态 (必须) ---
        const auth = firebase.auth();
        auth.onAuthStateChanged(user => {
            if (!user) {
                window.location.href = 'dashboard.html';
            } else {
                // 已登录, 执行页面逻辑
                initializeEditor();
            }
        });

        // --- 1. 获取元素 ---
        const editorTitle = document.getElementById('editor-title');
        const editorForm = document.getElementById('editor-form');
        const saveButton = document.getElementById('save-button');
        const editorMessage = document.getElementById('editor-message');

        // 表单字段
        const postTitle = document.getElementById('post-title');
        const postDate = document.getElementById('post-date');
        const postCategory = document.getElementById('post-category');
        const postImageUrl = document.getElementById('post-image-url');
        const postSummary = document.getElementById('post-summary');
        const postContent = document.getElementById('post-content');

        // --- 2. 检查是“新建”还是“编辑”模式 ---
        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('id'); // 如果是编辑模式, 这里会有ID
        const isEditMode = !!postId; // true or false

        // --- 3. 核心函数：初始化编辑器 ---
        async function initializeEditor() {
            if (isEditMode) {
                editorTitle.textContent = '编辑文章';

                try {
                    // [编辑模式] 1. 加载现有数据
                    const doc = await db.collection('posts').doc(postId).get();
                    if (!doc.exists) {
                        showMessage('错误：找不到这篇文章。', true);
                        return;
                    }

                    // 2. 填充表单
                    const data = doc.data();
                    postTitle.value = data.title || '';
                    postDate.value = data.date || '';
                    postCategory.value = data.category || '';
                    postImageUrl.value = data.imageUrl || '';
                    postSummary.value = data.summary || '';
                    postContent.value = data.content || '';

                } catch (error) {
                    showMessage('加载文章失败: ' + error.message, true);
                }

            } else {
                editorTitle.textContent = '新建文章';
                // [新建模式] 自动填充一个默认日期
                postDate.value = new Date().toISOString().split('T')[0];
            }
        }

        // --- 4. 核心函数：处理表单提交 ---
        editorForm.addEventListener('submit', async (e) => {
            e.preventDefault(); // 阻止刷新
            saveButton.disabled = true; // 防止重复提交
            saveButton.textContent = '保存中...';

            // 1. 收集表单数据
            const postData = {
                title: postTitle.value,
                date: postDate.value,
                category: postCategory.value,
                imageUrl: postImageUrl.value || '', // 确保空字段是 ''
                summary: postSummary.value || '',
                content: postContent.value,
            };

            try {
                if (isEditMode) {
                    // [编辑模式] 更新现有文档
                    await db.collection('posts').doc(postId).update(postData);
                    showMessage('文章更新成功！', false);

                } else {
                    // [新建模式] 创建新文档
                    // [注意] 我们不使用 .add()，因为我们想自己控制ID，
                    // 但为了简单，我们还是用 .add() 让 Firestore 自动生成 ID
                    const newDoc = await db.collection('posts').add(postData);
                    showMessage('文章发布成功！', false);

                    // [优化] 发布成功后, 页面变为 "编辑模式"
                    // 这样用户可以继续修改, 而不是创建一篇新文章
                    window.history.pushState({}, '', `editor.html?id=${newDoc.id}`);
                    // 更新全局变量
                    // postId = newDoc.id; // 这在实际框架中需要，但这里刷新更简单
                    // isEditMode = true;

                    // 或者, 直接T回 admin 列表
                    // window.location.href = 'admin.html';
                }
            } catch (error) {
                showMessage('保存失败: ' + error.message, true);
            } finally {
                saveButton.disabled = false;
                saveButton.textContent = '保存文章';
            }
        });

        // --- 5. 辅助函数：显示消息 ---
        function showMessage(message, isError) {
            editorMessage.textContent = message;
            editorMessage.className = isError ? 'message-error' : 'message-success';
        }

        // --- 6. 退出登录 (复用) ---
        document.getElementById('logout-button').addEventListener('click', (e) => {
            e.preventDefault();
            auth.signOut().then(() => {
                window.location.href = 'index.html';
            });
        });

    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>藏语字母记忆助手 - ShArch</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2.0">

    <style>
        .page-tibetan .main-content {
            padding-top: 100px;
            min-height: calc(100vh - 100px);
            background-color: var(--background-color);
        }

        .archive-header {
            padding: 20px 0 20px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 40px;
        }

        .archive-header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.04em;
            color: var(--text-color);
            margin-bottom: 32px;
        }

        .category-filter {
            display: flex;
            gap: 24px;
            margin-bottom: 16px;
            overflow-x: auto;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 16px;
        }

        .cat-btn {
            background: none;
            border: none;
            font-size: 1.05rem;
            font-weight: 500;
            color: var(--secondary-text-color);
            cursor: pointer;
            padding: 4px 8px;
            transition: color 0.2s ease;
            position: relative;
        }

        .cat-btn.active {
            color: var(--text-color);
        }

        .cat-btn.active::after {
            content: '';
            position: absolute;
            bottom: -17px;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: var(--text-color);
        }

        .cat-btn:hover {
            color: var(--text-color);
        }

        /* Tibetan Specific Styles */
        .page-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .page-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .letter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 24px;
            padding-bottom: 80px;
        }

        .letter-card {
            background-color: var(--section-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: border-color var(--transition-speed, 0.2s) ease, opacity var(--transition-speed, 0.2s) ease;
        }

        .letter-card:hover {
            border-color: var(--text-color);
        }

        .tibetan {
            font-size: 2.5rem;
            color: var(--text-color);
            margin-bottom: 12px;
            font-family: 'Noto Serif SC', serif;
        }

        .latin {
            font-size: 0.95rem;
            color: var(--secondary-text-color);
            font-family: 'Montserrat', sans-serif;
            font-weight: 500;
        }

        .tone-tag {
            background-color: transparent;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 2px 6px;
            font-size: 0.75rem;
            color: var(--secondary-text-color);
            margin-top: 8px;
        }

        /* 闪卡样式 */
        .flashcard-container {
            perspective: 1000px;
            margin: 40px auto;
            width: 100%;
            max-width: 360px;
            height: 240px;
        }

        .flashcard {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0.0, 0.2, 1);
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: var(--section-bg);
            border: 1px solid var(--border-color);
        }

        .front {
            font-size: 5rem;
            color: var(--text-color);
            font-family: 'Noto Serif SC', serif;
        }

        .back {
            transform: rotateY(180deg);
            color: var(--text-color);
        }

        .back .latin-large {
            font-size: 2.2rem;
            font-weight: 600;
            margin-bottom: 12px;
            font-family: 'Montserrat', sans-serif;
        }
        
        .back .sound-large {
            font-size: 1.2rem;
            color: var(--secondary-text-color);
        }

        /* 操作按钮 */
        .controls {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 40px;
            margin-bottom: 80px;
            flex-wrap: wrap;
        }

        .control-btn {
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--secondary-text-color);
            padding: 8px 24px;
            border-radius: 9999px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .control-btn:hover {
            border-color: var(--text-color);
            color: var(--text-color);
        }
    </style>
</head>

<body class="page-tibetan">
    <header>
        <div class="container navbar">
            <a href="index.html" class="logo">ShArch</a>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">首页</a></li>
                    <li><a href="categories.html">分类</a></li>
                    <li><a href="film-archieve.html">影视</a></li>
                    <li><a href="dashboard.html">控制台</a></li>
                </ul>
            </nav>
            <div class="hamburger-menu">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            <div class="archive-header">
                <h1>藏语字母记忆助手</h1>
                <div class="category-filter" id="category-filters">
                    <button class="cat-btn active" onclick="switchPage('list', this)">字母表</button>
                    <button class="cat-btn" onclick="switchPage('flashcard', this)">闪卡记忆</button>
                </div>
            </div>

            <!-- 字母表页面 -->
            <div class="page-content active" id="list">
                <div class="letter-grid" id="letterGrid"></div>
            </div>

            <!-- 闪卡页面 -->
            <div class="page-content" id="flashcard">
                <div class="flashcard-container">
                    <div class="flashcard" id="card" onclick="flipCard()">
                        <div class="card-face front" id="front"></div>
                        <div class="card-face back" id="back">
                            <div class="latin-large" id="back-latin"></div>
                            <div class="sound-large" id="back-sound"></div>
                            <div class="tone-tag" id="back-tone" style="margin-top: 16px; font-size: 0.9rem;"></div>
                        </div>
                    </div>
                </div>
                <div class="controls">
                    <button class="control-btn" onclick="prevCard()">上一个</button>
                    <button class="control-btn" onclick="shuffleCards()">随机打乱</button>
                    <button class="control-btn" onclick="nextCard()">下一个</button>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="social-links">
                <a href="https://github.com/OrsonKrennlc" target="_blank">GitHub</a>
                <a href="#" target="_blank">LinkedIn</a>
                <a href="#" target="_blank">Twitter</a>
            </div>
            <p>&copy; 2025 orsonkrennlc. All rights reserved.</p>
        </div>
    </footer>

    <script>
        // Nav Menu
        const hamburgerMenu = document.querySelector('.hamburger-menu');
        const navLinks = document.querySelector('.nav-links');
        if (hamburgerMenu && navLinks) {
            hamburgerMenu.addEventListener('click', () => {
                hamburgerMenu.classList.toggle('active');
                navLinks.classList.toggle('active');
            });
        }

        // 藏语30个辅音字母完整数据
        const tibetanLetters = [
            { letter: 'ཀ', name: 'ka', sound: '卡', tone: '高音 / 轻音' },
            { letter: 'ཁ', name: 'kha', sound: '喀', tone: '高音 / 轻音' },
            { letter: 'ག', name: 'ga', sound: '嘎', tone: '低音 / 重音' },
            { letter: 'ང', name: 'nga', sound: '恩嘎', tone: '低音 / 重音' },
            { letter: 'ཅ', name: 'ca', sound: '恰', tone: '高音 / 轻音' },
            { letter: 'ཆ', name: 'cha', sound: '洽', tone: '高音 / 轻音' },
            { letter: 'ཇ', name: 'ja', sound: '甲', tone: '低音 / 重音' },
            { letter: 'ཉ', name: 'nya', sound: '尼亚', tone: '低音 / 重音' },
            { letter: 'ཏ', name: 'ta', sound: '塔', tone: '高音 / 轻音' },
            { letter: 'ཐ', name: 'tha', sound: '他', tone: '高音 / 轻音' },
            { letter: 'ད', name: 'da', sound: '达', tone: '低音 / 重音' },
            { letter: 'ན', name: 'na', sound: '那', tone: '低音 / 重音' },
            { letter: 'པ', name: 'pa', sound: '巴', tone: '高音 / 轻音' },
            { letter: 'ཕ', name: 'pha', sound: '帕', tone: '高音 / 轻音' },
            { letter: 'བ', name: 'ba', sound: '叭', tone: '低音 / 重音' },
            { letter: 'མ', name: 'ma', sound: '玛', tone: '低音 / 重音' },
            { letter: 'ཙ', name: 'tsa', sound: '匝', tone: '高音 / 轻音' },
            { letter: 'ཚ', name: 'tsha', sound: '擦', tone: '高音 / 轻音' },
            { letter: 'ཛ', name: 'dza', sound: '扎', tone: '低音 / 重音' },
            { letter: 'ཝ', name: 'wa', sound: '瓦', tone: '低音 / 重音' },
            { letter: 'ཞ', name: 'zha', sound: '夏', tone: '低音 / 重音' },
            { letter: 'ཟ', name: 'za', sound: '扎', tone: '低音 / 重音' },
            { letter: 'འ', name: '\'a', sound: '阿', tone: '低音 / 重音' },
            { letter: 'ཡ', name: 'ya', sound: '亚', tone: '低音 / 重音' },
            { letter: 'ར', name: 'ra', sound: '拉', tone: '低音 / 重音' },
            { letter: 'ལ', name: 'la', sound: '啦', tone: '低音 / 重音' },
            { letter: 'ཤ', name: 'sha', sound: '夏', tone: '高音 / 轻音' },
            { letter: 'ས', name: 'sa', sound: '萨', tone: '高音 / 轻音' },
            { letter: 'ཧ', name: 'ha', sound: '哈', tone: '高音 / 轻音' },
            { letter: 'ཨ', name: 'a', sound: '啊', tone: '高音 / 轻音' }
        ];

        // 全局变量
        let currentIndex = 0;
        let isFlipped = false;
        let letters = [...tibetanLetters];

        // 初始化
        window.onload = function () {
            renderLetterList();
            updateCard();
        }

        // 切换页面
        function switchPage(id, btnElement) {
            document.querySelectorAll('.page-content').forEach(page => page.classList.remove('active'));
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if (btnElement) {
                btnElement.classList.add('active');
            }
        }

        // 渲染字母表
        function renderLetterList() {
            const grid = document.getElementById('letterGrid');
            letters.forEach(item => {
                const card = document.createElement('div');
                card.className = 'letter-card';
                card.innerHTML = `
                    <div class="tibetan">${item.letter}</div>
                    <div class="latin">${item.name} / ${item.sound}</div>
                    <div class="tone-tag">${item.tone}</div>
                `;
                grid.appendChild(card);
            });
        }

        // 更新闪卡内容
        function updateCard() {
            const current = letters[currentIndex];
            document.getElementById('front').innerText = current.letter;
            document.getElementById('back-latin').innerText = current.name;
            document.getElementById('back-sound').innerText = current.sound;
            document.getElementById('back-tone').innerText = current.tone;
            document.getElementById('card').classList.remove('flipped');
            isFlipped = false;
        }

        // 翻转卡片
        function flipCard() {
            document.getElementById('card').classList.toggle('flipped');
            isFlipped = !isFlipped;
        }

        // 上一个
        function prevCard() {
            currentIndex = (currentIndex - 1 + letters.length) % letters.length;
            updateCard();
        }

        // 下一个
        function nextCard() {
            currentIndex = (currentIndex + 1) % letters.length;
            updateCard();
        }

        // 随机打乱
        function shuffleCards() {
            letters.sort(() => Math.random() - 0.5);
            currentIndex = 0;
            updateCard();
        }
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分类文章 - orsonkrenlc's blog</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2.0">

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <script src="firebase-config.js"></script>

</head>

<body class="page-category-posts">
    <header>
        <div class="container navbar">
            <a href="index.html" class="logo">ShArch</a>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">首页</a></li>
                    <li><a href="categories.html">分类</a></li>
                    <li><a href="films">影视</a></li>
                    <li><a href="dashboard.html">控制台</a></li>
                </ul>
            </nav>
            <div class="hamburger-menu">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </header>

    <main class="main-content">

        <section class="category-header" id="category-posts-header">
            <div class="container">
                <h1 id="category-title-container">正在加载分类...</h1>
                <p id="category-description-container"></p>
            </div>
        </section>

        <section class="category-section">
            <div class="container">
                <div class="post-grid" id="post-grid-container">
                    <p id="posts-loading" style="color: var(--secondary-text-color);">
                        正在加载文章...
                    </p>
                </div>
            </div>
        </section>

    </main>

    <footer>
        <div class="container">
            <p>&copy; 2025 orsonkrennlc. All rights reserved.</p>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadCategoryPosts();
        });

        async function loadCategoryPosts() {
            const gridContainer = document.getElementById('post-grid-container');
            const loadingIndicator = document.getElementById('posts-loading');
            const titleContainer = document.getElementById('category-title-container');
            const descContainer = document.getElementById('category-description-container');

            try {
                const urlParams = new URLSearchParams(window.location.search);
                const categoryId = urlParams.get('id');

                if (!categoryId) {
                    titleContainer.innerText = "错误";
                    loadingIndicator.innerText = "未指定分类 ID。";
                    loadingIndicator.style.color = "var(--error-color)";
                    return;
                }

                const categoryRef = db.collection('categories').doc(categoryId);
                const categoryDoc = await categoryRef.get();

                if (!categoryDoc.exists) {
                    titleContainer.innerText = "错误";
                    loadingIndicator.innerText = "所选分类不存在。";
                    loadingIndicator.style.color = "var(--error-color)";
                    return;
                }

                const categoryData = categoryDoc.data();
                const categoryName = categoryData.name;

                titleContainer.innerText = categoryName;
                descContainer.innerText = categoryData.description || '';
                document.title = categoryName + " - 我的华丽博客";

                const postsQuery = db.collection('posts')
                    .where('category', '==', categoryName)
                    .orderBy('date', 'desc');

                const snapshot = await postsQuery.get();

                if (snapshot.empty) {
                    loadingIndicator.innerText = `“${categoryName}” 分类下目前还没有文章。`;
                    return;
                }

                let postsHtml = '';
                snapshot.forEach(doc => {
                    const postData = doc.data();
                    const postId = doc.id;
                    postsHtml += createPostCard(postData, postId);
                });

                loadingIndicator.remove();
                gridContainer.innerHTML = postsHtml;

            } catch (error) {
                console.error("加载分类文章时出错:", error);
                titleContainer.innerText = "加载错误";
                loadingIndicator.innerText = "加载文章时发生网络错误。";
                loadingIndicator.style.color = "var(--error-color)";
            }
        }

        function createPostCard(data, id) {
            const summary = data.summary || (data.content ? data.content.substring(0, 80) + '...' : '');

            return `
                <a href="post.html?id=${id}" class="post-card">
                    <div class="post-card-date">${data.date || '未知日期'}</div>
                    <div class="post-card-content">
                        <h3>${data.title || '无标题'}</h3>
                        <p>${summary}</p>
                    </div>
                </a>
            `;
        }

        const hamburgerMenu = document.querySelector('.hamburger-menu');
        const navLinks = document.querySelector('.nav-links');

        hamburgerMenu.addEventListener('click', () => {
            hamburgerMenu.classList.toggle('active');
            navLinks.classList.toggle('active');
        });
    </script>
</body>

</html>

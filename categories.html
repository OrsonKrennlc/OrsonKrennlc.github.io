<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分类 - orsonkrenlc's blog</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2.0">

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <script src="firebase-config.js"></script>

</head>

<body class="page-categories">

    <header>
        <div class="container navbar">
            <a href="index.html" class="logo">ShArch</a>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">首页</a></li>
                    <li><a href="categories.html">分类</a></li>
                    <li><a href="films">影视</a></li>
                    <li><a href="dashboard.html">控制台</a></li>
                </ul>
            </nav>
            <div class="hamburger-menu">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </header>

    <main class="main-content">

        <section class="category-header">
            <div class="container">
                <h1>文章分类</h1>
                <p>探索不同领域的主题，从技术深度到生活随笔，总有你感兴趣的内容。</p>
            </div>
        </section>

        <section class="category-section">
            <div class="container">
                <div class="category-grid" id="category-grid-container">
                    <p id="categories-loading" style="color: var(--secondary-text-color);">
                        正在加载分类...
                    </p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2025 orsonkrennlc. All rights reserved.</p>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadCategories();
        });

        async function loadCategories() {
            const gridContainer = document.getElementById('category-grid-container');
            const loadingIndicator = document.getElementById('categories-loading');

            if (!loadingIndicator) return;

            try {
                const collectionName = 'categories';
                const categoriesCollection = db.collection(collectionName);
                const snapshot = await categoriesCollection.get();

                if (snapshot.empty) {
                    loadingIndicator.innerText = "目前还没有分类。";
                    return;
                }

                let categoriesHtml = '';
                snapshot.forEach(doc => {
                    const catData = doc.data();
                    const catId = doc.id;
                    categoriesHtml += createCategoryCard(catData, catId);
                });

                loadingIndicator.remove();
                gridContainer.innerHTML = categoriesHtml;

            } catch (error) {
                console.error("查询过程中出现错误!", error);
                loadingIndicator.innerText = "加载分类时发生网络错误。";
                loadingIndicator.style.color = "var(--error-color)";
            }
        }

        function createCategoryCard(data, id) {
            const categoryLink = `category-posts.html?id=${id}`;

            return `
                <a href="${categoryLink}" class="category-card">
                    <h2>${data.name || '无标题'}</h2>
                    <p>${data.description || '暂无描述'}</p>
                </a>
            `;
        }

        const hamburgerMenu = document.querySelector('.hamburger-menu');
        const navLinks = document.querySelector('.nav-links');

        hamburgerMenu.addEventListener('click', () => {
            hamburgerMenu.classList.toggle('active');
            navLinks.classList.toggle('active');
        });
    </script>
</body>

</html>

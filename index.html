<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>orsonkrenlc's blog</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2.0">

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <script src="firebase-config.js"></script>

</head>

<body class="page-home">

    <header>
        <div class="container navbar">
            <a href="index.html" class="logo">ShArch</a>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">首页</a></li>
                    <li><a href="categories.html">分类</a></li>
                    <li><a href="film-archieve.html">影视</a></li>
                    <li><a href="dashboard.html">控制台</a></li>
                </ul>
            </nav>
            <div class="hamburger-menu">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </header>

    <main>
        <section class="hero-carousel-section">
            <div class="container">
                <div class="carousel-container">
                    <div id="hero-carousel-inner" class="hero-carousel-inner">
                        <!-- 轮播内容由JS注入 -->
                    </div>
                    <button id="hero-prev" class="carousel-btn prev-btn" aria-label="上一篇">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="15 18 9 12 15 6"></polyline>
                        </svg>
                    </button>
                    <button id="hero-next" class="carousel-btn next-btn" aria-label="下一篇">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="9 18 15 12 9 6"></polyline>
                        </svg>
                    </button>
                    <div id="hero-carousel-indicators" class="carousel-indicators"></div>
                </div>
            </div>
        </section>

        <section class="blog-posts">
            <div class="container">
                <h2>最新文章</h2>

                <div class="post-grid" id="post-grid-container">
                    <p id="posts-loading" style="color: var(--secondary-text-color);">
                        正在从数据库加载最新文章...
                    </p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <div class="social-links">
                <a href="https://github.com/OrsonKrennlc" target="_blank">GitHub</a>
                <a href="#" target="_blank">LinkedIn</a>
                <a href="#" target="_blank">Twitter</a>
            </div>
            <p>&copy; 2025 orsonkrennlc. All rights reserved.</p>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadAllPosts();
        });

        async function loadAllPosts() {
            const gridContainer = document.getElementById('post-grid-container');
            const loadingIndicator = document.getElementById('posts-loading');

            if (!loadingIndicator) return;

            try {
                const postsCollection = db.collection('posts').orderBy("date", "desc");
                const snapshot = await postsCollection.get();

                if (snapshot.empty) {
                    loadingIndicator.innerText = "目前还没有文章。";
                    return;
                }

                const docs = snapshot.docs;
                const topDocs = docs.slice(0, 3);
                renderHeroCarousel(topDocs);

                let postsHtml = '';
                docs.forEach(doc => {
                    const postData = doc.data();
                    const postId = doc.id;
                    postsHtml += createPostCard(postData, postId);
                });

                loadingIndicator.remove();
                gridContainer.innerHTML = postsHtml;

            } catch (error) {
                console.error("加载文章列表出错:", error);
                loadingIndicator.innerText = "加载文章时发生网络错误。";
                loadingIndicator.style.color = "var(--error-color)";
            }
        }

        function createPostCard(data, id) {
            const summary = data.summary || (data.content ? data.content.substring(0, 80) + '...' : '');

            return `
                <a href="post.html?id=${id}" class="post-card">
                    <div class="post-card-date">${data.date || '未知日期'}</div>
                    <div class="post-card-content">
                        <h3>${data.title || '无标题'}</h3>
                        <p>${summary}</p>
                    </div>
                </a>
            `;
        }

        const hamburgerMenu = document.querySelector('.hamburger-menu');
        const navLinks = document.querySelector('.nav-links');

        hamburgerMenu.addEventListener('click', () => {
            hamburgerMenu.classList.toggle('active');
            navLinks.classList.toggle('active');
        });

        let currentSlide = 0;
        let totalSlides = 0;
        let slideInterval;

        function renderHeroCarousel(topDocs) {
            const carouselInner = document.getElementById('hero-carousel-inner');
            const indicators = document.getElementById('hero-carousel-indicators');
            if (!carouselInner || topDocs.length === 0) return;

            totalSlides = topDocs.length;
            let html = '';
            let indicatorsHtml = '';

            topDocs.forEach((doc, index) => {
                const data = doc.data();
                const title = data.title || '无标题';
                const summary = data.summary || (data.content ? data.content.substring(0, 60) + '...' : '一段精彩的旅程');
                const imgUrl = data.imageUrl || data.coverImage || data.image || data.featuredImage;
                const bgStyle = imgUrl ? `background-image: url('${imgUrl}');` : `background: linear-gradient(135deg, #1f1c2c 0%, #928DAB 100%);`;

                html += `
                    <a href="post.html?id=${doc.id}" class="hero-carousel-slide" style="${bgStyle}">
                        <div class="hero-carousel-overlay"></div>
                        <div class="hero-carousel-content">
                            <h2 class="hero-carousel-title">${title}</h2>
                            <hr class="hero-carousel-divider">
                            <p class="hero-carousel-summary">${summary}</p>
                        </div>
                    </a>
                `;

                indicatorsHtml += `<div class="carousel-dot ${index === 0 ? 'active' : ''}" onclick="goToSlide(${index})"></div>`;
            });

            carouselInner.innerHTML = html;
            if (indicators) indicators.innerHTML = indicatorsHtml;

            const prevBtn = document.getElementById('hero-prev');
            const nextBtn = document.getElementById('hero-next');
            if (prevBtn) prevBtn.addEventListener('click', prevSlide);
            if (nextBtn) nextBtn.addEventListener('click', nextSlide);

            startSlideInterval();
        }

        function goToSlide(index) {
            currentSlide = index;
            updateCarousel();
            resetSlideInterval();
        }

        function nextSlide() {
            currentSlide = (currentSlide + 1) % totalSlides;
            updateCarousel();
        }

        function prevSlide() {
            currentSlide = (currentSlide - 1 + totalSlides) % totalSlides;
            updateCarousel();
        }

        function updateCarousel() {
            const carouselInner = document.getElementById('hero-carousel-inner');
            if (carouselInner) {
                carouselInner.style.transform = `translateX(-${currentSlide * 100}%)`;
            }
            const dots = document.querySelectorAll('.carousel-dot');
            dots.forEach((dot, index) => {
                dot.classList.toggle('active', index === currentSlide);
            });
        }

        function startSlideInterval() {
            slideInterval = setInterval(nextSlide, 5000);
        }

        function resetSlideInterval() {
            clearInterval(slideInterval);
            startSlideInterval();
        }
    </script>
</body>

</html>
